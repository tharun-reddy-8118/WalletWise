{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom" style="border-color: var(--card-border) !important;">
    <h1 class="h2 font-weight-bold">Add Income</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <a href="{% url 'income' %}" class="btn btn-outline-secondary text-main border-secondary">
            <i class="bi bi-arrow-left"></i> Back to Income
        </a>
    </div>
</div>

<div class="row">
    <div class="col-md-8 col-lg-6">
        <div class="glass-card">
            <form method="POST" action="{% url 'add-income' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label text-muted">Amount</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-muted">₹</span>
                        <input type="number" step="0.01" name="amount" class="form-control form-control-custom" required placeholder="0.00">
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label text-muted">Description</label>
                    <input type="text" name="description" class="form-control form-control-custom" required placeholder="e.g., Salary, Freelance">
                </div>
                
                <div class="mb-3">
                    <label class="form-label text-muted">Source</label>
                    <input type="text" name="source" class="form-control form-control-custom" required placeholder="e.g., Job, Side Hustle">
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted">Date</label>
                    <input type="date" name="income_date" class="form-control form-control-custom" required>
                </div>
                
                <button type="submit" class="btn btn-gradient w-100">Save Income</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
